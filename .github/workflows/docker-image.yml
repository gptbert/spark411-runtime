name: docker-image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY }}

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required local build assets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            patchelf
            jdk-21-linux-x64.tar.gz
            glibc-2.28.tar.gz
            Miniconda3-latest-Linux-x86_64.sh
            spark-4.1.1-bin-hadoop3.tgz
          )
          missing=0
          for f in "${required[@]}"; do
            if [[ ! -e "$f" ]]; then
              echo "Missing required build asset: $f" >&2
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "Repository is missing one or more required offline build assets." >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build test image (PR and push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: local/spark411-runtime:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm local/spark411-runtime:test /bin/bash -lc '
            source /opt/runtime/bin/env.sh
            /opt/runtime/bin/spark4-java -version
            /opt/runtime/bin/spark4-python -V
            python - <<"PY"
import pyspark, pyarrow, pandas, numpy
print("pyspark", pyspark.__version__)
print("pyarrow", pyarrow.__version__)
print("pandas", pandas.__version__)
print("numpy", numpy.__version__)
PY
          '

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
